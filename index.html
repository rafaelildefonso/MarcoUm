    <style>
      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
      html{scroll-behavior:smooth}
      body{background:#f4f0e8;color:#111;font-family:'Barlow',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;margin:0}
      #root{width:100%;min-height:100svh;display:flex;flex-direction:column;box-sizing:border-box;overflow-x:hidden}
      ::-webkit-scrollbar{width:4px}
      ::-webkit-scrollbar-track{background:#f4f0e8}
      ::-webkit-scrollbar-thumb{background:#c0392b}
      #prog{position:fixed;top:0;left:0;height:3px;background:#c0392b;z-index:10000;pointer-events:none;transition:width .05s linear}
      .rv{opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
      .rv.in{opacity:1;transform:none}
      @keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
      @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
      @keyframes lineUp{from{opacity:0;transform:translateY(110%)}to{opacity:1;transform:none}}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
      @keyframes spin3d{from{transform:rotateX(-15deg) rotateY(0deg)}to{transform:rotateX(-15deg) rotateY(360deg)}}
      .hov-target{will-change:transform}
      .hamburger-btn{display:none;flex-direction:column;justify-content:center;align-items:center;width:58px;height:58px;background:transparent;border:none;cursor:pointer;padding:18px 16px;gap:5px;margin-left:auto;flex-shrink:0}
      .hamburger-btn span{display:block;width:100%;height:2px;background:#fff;border-radius:1px}
      .mobile-menu{position:fixed;top:58px;left:0;right:0;background:#111;z-index:500;border-top:1px solid rgba(255,255,255,.07)}
      .skills-grid{overflow:hidden}
      .portfolio-track::-webkit-scrollbar{display:none}
      .portfolio-track{-webkit-overflow-scrolling:touch}
      .portfolio-grid a{text-decoration:none}
      .portfolio-grid a img{display:block}
      @media (max-width: 768px) {
        .portfolio-grid{grid-template-columns:1fr!important}
        .back-to-home-desktop{display:block!important}
      }
      @media (min-width: 769px) and (max-width: 1024px) {
        .portfolio-grid{grid-template-columns:repeat(2,1fr)!important}
      }
      @media (max-width: 768px) {
        .desktop-nav{display:none!important}
        .hamburger-btn{display:flex!important}
        section[style*="min-height: 100vh"] > div[style*="padding: 120px"]{padding:100px 24px 60px!important}
        section[style*="min-height: 100vh"] > div[style*="right: 60px"]{display:none!important}
        section[style*="min-height: 100vh"] > div[style*="bottom: 40px"]{left:24px!important}
        .about-grid{grid-template-columns:1fr!important;gap:48px!important;padding:72px 24px!important}
        .about-cubes{display:none!important}
        .pricing-section{padding:72px 24px!important}
        .pricing-header{flex-direction:column!important;align-items:flex-start!important;gap:12px!important}
        .pricing-header p{text-align:left!important}
        .plans-grid{grid-template-columns:1fr!important}
        .plans-grid>div{transform:none!important}
        .extras-grid{grid-template-columns:1fr!important}
        .conditions-grid{grid-template-columns:1fr!important}
        .conditions-grid>div[style*="span 2"]{grid-column:span 1!important}
        .skills-section{padding:72px 24px!important}
        .skills-grid{grid-template-columns:repeat(2,1fr)!important;overflow:hidden!important}
        .skills-grid .hov-target{padding:24px 16px!important}
        .contact-section{padding:72px 24px 60px!important}
        .contact-grid{grid-template-columns:1fr!important;gap:40px!important}
        footer{padding:60px 24px 32px!important}
        footer>div[style*="justify-content: space-between"]:last-child{flex-direction:column!important;gap:12px!important;align-items:flex-start!important}
      }
      @media (min-width: 769px) and (max-width: 1024px) {
        .skills-grid{grid-template-columns:repeat(4,1fr)!important}
        .skills-section{padding:80px 32px!important}
      }
    </style>
